<!DOCTYPE html>
<html>
<head>
<title>Attendance Report</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h2>Attendance Report</h2>

<table border="1">

<tr>
<th>Name</th>
<th>Present Days</th>
<th>Total Days</th>
<th>Percentage</th>
</tr>

{% for s in data %}

<tr>

<td>{{s.name}}</td>
<td>{{s.present_days}}</td>
<td>{{s.total_days}}</td>
<td>{{s.percentage}} %</td>

</tr>

{% endfor %}

</table>

</body>
</html>
